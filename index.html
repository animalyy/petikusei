<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>モコロンの草原</title>
<style>
:root{
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --ui-bg: rgba(255,255,255,.94);
  --ui-line: rgba(16,34,58,.08);
  --ui-text: #1e3957;
  --grass-1:#94c56a;
  --grass-2:#6ea44a;
  --grass-3:#4f7e35;
  --sky-top:#89bbe9;
  --sky-mid:#dceeff;
  --sky-low:#f6ecd2;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{margin:0;height:100%;overflow:hidden;background:#8db7df;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif}
#app{position:fixed;inset:0;overflow:hidden;background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 46%,var(--sky-low) 64%,var(--grass-1) 65%,var(--grass-2) 80%,var(--grass-3) 100%)}
#skyGlow{position:absolute;inset:0;background:radial-gradient(140% 70% at 50% 8%, rgba(255,255,255,.82), rgba(255,255,255,0) 50%)}
.cloud{position:absolute;border-radius:999px;background:rgba(255,255,255,.72);filter:blur(1px);animation:cloudDrift linear infinite}
.cloud:before,.cloud:after{content:"";position:absolute;border-radius:999px;background:inherit}
.cloud:before{width:60%;height:100%;left:12%;top:-42%}
.cloud:after{width:45%;height:90%;right:10%;top:-20%}
#cloud1{width:140px;height:34px;left:-160px;top:12vh;animation-duration:42s}
#cloud2{width:110px;height:28px;left:-140px;top:20vh;animation-duration:55s;animation-delay:-12s;opacity:.7}
#cloud3{width:180px;height:42px;left:-220px;top:8vh;animation-duration:64s;animation-delay:-24s;opacity:.55}
@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 320px))}}
#farHills{position:absolute;left:-10%;right:-10%;bottom:38vh;height:24vh;background:
  radial-gradient(70% 120% at 20% 100%, #7eab61 0 54%, transparent 55%),
  radial-gradient(86% 130% at 56% 100%, #86b46a 0 55%, transparent 56%),
  radial-gradient(72% 118% at 92% 100%, #739b57 0 54%, transparent 55%);
  opacity:.98}
#midHills{position:absolute;left:-8%;right:-8%;bottom:36vh;height:28vh;background:
  radial-gradient(84% 130% at 16% 100%, #739e52 0 54%, transparent 55%),
  radial-gradient(88% 140% at 49% 100%, #6b964c 0 54%, transparent 55%),
  radial-gradient(76% 126% at 84% 100%, #628c45 0 54%, transparent 55%)}
#soilBand{position:absolute;left:0;right:0;bottom:0;height:48vh;background:
  linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(53,73,40,.10) 22%, rgba(34,49,27,.22) 100%),
  radial-gradient(34% 12% at 52% 64%, rgba(34,49,27,.19), transparent 62%),
  radial-gradient(90% 22% at 20% 88%, rgba(94,67,35,.24), transparent 56%),
  radial-gradient(70% 18% at 74% 92%, rgba(86,60,30,.18), transparent 55%)}
#fence{position:absolute;left:-4%;right:-4%;bottom:33vh;height:58px;opacity:.9}
.fenceRail{position:absolute;left:0;right:0;height:7px;background:#8e6b45;border-radius:999px;box-shadow:0 1px 0 rgba(255,255,255,.18) inset}
.fenceRail.r1{top:10px}.fenceRail.r2{top:30px}
.post{position:absolute;bottom:0;width:11px;height:58px;background:linear-gradient(180deg,#9d774a,#7b5f3d);border-radius:4px}
#barn{position:absolute;right:9vw;bottom:20vh;width:86px;height:54px;opacity:.38;filter:blur(.2px)}
#barn:before{content:"";position:absolute;left:10px;right:10px;bottom:0;height:34px;background:#7f5b3a;border-radius:4px 4px 2px 2px}
#barn:after{content:"";position:absolute;left:4px;right:4px;top:0;height:28px;background:#6f4932;clip-path:polygon(50% 0,100% 100%,0 100%)}
#grassFront{position:absolute;left:0;right:0;bottom:0;height:34vh;overflow:hidden}
.blade{position:absolute;bottom:0;width:3px;border-radius:3px 3px 0 0;background:linear-gradient(180deg,#a8e077,#5e9242);transform-origin:bottom center;animation:sway 3.6s ease-in-out infinite}
.blade.dark{background:linear-gradient(180deg,#88cc5d,#487732)}
.blade.wheat{background:linear-gradient(180deg,#efe38e,#b69d46)}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(5.5deg)}}
#weather{position:absolute;top:calc(14px + var(--safe-top));left:14px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.78);color:#243b57;font-size:14px;font-weight:900;border:1px solid rgba(255,255,255,.48);backdrop-filter:blur(10px);z-index:50}
#groundHint{position:absolute;top:calc(58px + var(--safe-top));left:14px;z-index:54;opacity:0;transform:translateY(-4px);transition:opacity .2s ease,transform .2s ease;pointer-events:none;max-width:min(62vw,280px)}
#groundHint.show{opacity:1;transform:translateY(0)}
#groundHintGlow{display:none}
#groundHintLabel{display:inline-block;padding:2px 2px 0;color:#203854;font-size:24px;font-weight:900;line-height:1.2;text-shadow:0 1px 0 rgba(255,255,255,.72),0 0 10px rgba(255,255,255,.18)}
#cpu{display:none}
#stage{position:absolute;inset:0;z-index:20}
#shadow{position:absolute;left:50%;bottom:11.8vh;width:170px;height:30px;transform:translateX(-50%);background:radial-gradient(circle, rgba(0,0,0,.2) 0%, rgba(0,0,0,.08) 42%, rgba(0,0,0,0) 70%);border-radius:50%;filter:blur(2px);transition:all .55s cubic-bezier(.34,1.56,.64,1)}
#petWrap{position:absolute;left:50%;bottom:12.4vh;transform:translateX(-50%) scale(4.2);transform-origin:50% 100%;transition:left .55s cubic-bezier(.34,1.56,.64,1),bottom .55s cubic-bezier(.34,1.56,.64,1),transform .55s cubic-bezier(.34,1.56,.64,1)}
canvas#pet{display:block;image-rendering:pixelated;image-rendering:crisp-edges;width:96px;height:96px;filter:none !important;-webkit-transform:translateZ(0);transform:translateZ(0)}
#hitArea{position:absolute;left:50%;bottom:8.8vh;width:280px;height:320px;transform:translateX(-50%);z-index:40}
#bubble{position:absolute;left:50%;bottom:calc(12.4vh + 350px);transform:translateX(-50%) scale(.72);padding:10px 18px;border-radius:24px;background:rgba(255,255,255,.96);color:#314f69;font-size:22px;font-weight:800;box-shadow:0 12px 30px rgba(0,0,0,.12);opacity:0;transition:opacity .24s ease,transform .24s ease;pointer-events:none;z-index:60;max-width:74vw;text-align:center}
#bubble.show{opacity:1;transform:translateX(-50%) scale(1) translateY(-12px)}
#actions{position:absolute;left:16px;right:16px;bottom:calc(16px + var(--safe-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:12px;z-index:80}
button{border:0;border-radius:22px;padding:18px 8px;background:var(--ui-bg);color:var(--ui-text);font-size:15px;font-weight:900;box-shadow:0 7px 0 rgba(0,0,0,.06);border:1px solid var(--ui-line);transition:.12s}
button:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.06)}
button .icon{display:block;font-size:22px;margin-bottom:4px;line-height:1}
#reportDrawer{position:absolute;inset:0;display:flex;align-items:stretch;justify-content:stretch;padding:0;background:rgba(11,18,28,.52);backdrop-filter:blur(8px);color:#1f3853;opacity:0;pointer-events:none;transition:.22s ease;z-index:140}
#reportDrawer.show{opacity:1;pointer-events:auto}
#reportCard{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));overflow:auto;background:rgba(255,255,255,.985);border-radius:18px;padding:28px 22px 34px;box-shadow:none;border:0;font-family:'Hiragino Sans','Yu Gothic UI','Yu Gothic',sans-serif}
#reportHint{margin-top:12px;font-size:14px;color:#5a7088;text-align:center}
#reportShort{font-weight:900;color:#254a71;margin-bottom:14px;font-size:24px;line-height:1.5;font-family:'Hiragino Sans','Yu Gothic UI','Yu Gothic',sans-serif}
#reportDetail{opacity:.92;font-size:19px;line-height:1.75;white-space:pre-wrap}

#historyPanel{position:absolute;inset:0;background:rgba(11,18,28,.48);backdrop-filter:blur(8px);z-index:145;opacity:0;pointer-events:none;transition:.22s ease;display:flex;align-items:center;justify-content:center;padding:24px}
#historyPanel.show{opacity:1;pointer-events:auto}
#historyCard{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));overflow:auto;background:rgba(255,255,255,.985);border-radius:18px;padding:28px 22px 34px;box-shadow:none;border:0;font-family:'Hiragino Sans','Yu Gothic UI','Yu Gothic',sans-serif}
#historyTitle{font-size:24px;font-weight:900;color:#254a71;margin-bottom:16px;line-height:1.45}
.historyItem{padding:12px 10px;border-radius:16px;background:rgba(223,238,252,.46);margin-bottom:10px;border:1px solid rgba(37,74,113,.08)}
.historyItem .hs{font-size:18px;font-weight:800;color:#254a71;margin-bottom:8px;line-height:1.5}
.historyItem .hd{font-size:18px;line-height:1.85;color:#2d4259;white-space:pre-wrap}
#historyHint{font-size:12px;color:#5a7088;text-align:center;margin-top:10px}


.star{position:absolute;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--d) ease-in-out infinite;z-index:8;pointer-events:none}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:.85;transform:scale(1.2)}}
@keyframes cloudPass{0%,100%{filter:brightness(1)}50%{filter:brightness(.96)}}
.cloud-pass{animation:cloudPass 30s ease-in-out infinite}


#summaryPanel{position:absolute;inset:0;background:rgba(11,18,28,.48);backdrop-filter:blur(8px);z-index:146;opacity:0;pointer-events:none;transition:.22s ease;display:flex;align-items:center;justify-content:center;padding:24px}
#summaryPanel.show{opacity:1;pointer-events:auto}
#summaryCard{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));overflow:auto;background:rgba(255,255,255,.985);border-radius:18px;padding:28px 22px 34px;box-shadow:none;border:0;font-family:'Hiragino Sans','Yu Gothic UI','Yu Gothic',sans-serif}
#summaryTitle{font-size:24px;font-weight:900;color:#254a71;margin-bottom:16px;line-height:1.45}
.summaryGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.todayGrid{grid-template-columns:1fr}
.summaryItem{word-break:keep-all;overflow-wrap:break-word}
.summaryBlock{padding:12px 10px;border-radius:16px;background:rgba(223,238,252,.46);border:1px solid rgba(37,74,113,.08);overflow:hidden}
.summaryHead{font-size:18px;font-weight:900;color:#254a71;margin-bottom:8px;line-height:1.5}
.summaryItem{font-size:18px;line-height:1.85;color:#2d4259;margin:4px 0}
.newTag{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:999px;background:#fff1b8;color:#8a6500;font-size:11px;font-weight:900;vertical-align:middle}
.summaryDist{font-size:24px;font-weight:900;color:#254a71;line-height:1.5}
.summarySub{font-size:15px;color:#5a7088;margin-top:6px;line-height:1.7}
#summaryHint{font-size:12px;color:#5a7088;text-align:center;margin-top:12px}


#topNav{position:absolute;top:calc(14px + var(--safe-top));right:14px;display:flex;align-items:center;gap:8px;z-index:130}
#topNav button{position:static !important;display:block;padding:8px 13px;border-radius:999px;background:rgba(255,255,255,.84);color:#1e3957;font-size:13px;font-weight:900;box-shadow:0 3px 10px rgba(0,0,0,.09);border:1px solid rgba(16,34,58,.08);backdrop-filter:blur(10px);margin:0}
#topNav button:active{transform:translateY(2px);box-shadow:0 1px 4px rgba(0,0,0,.08)}
button.dim{opacity:.38}


#ritualPanel{position:absolute;inset:0;background:rgba(11,18,28,.36);backdrop-filter:blur(6px);z-index:147;opacity:0;pointer-events:none;transition:.22s ease;display:flex;align-items:flex-end;justify-content:center;padding:18px}
#ritualPanel.show{opacity:1;pointer-events:auto}
#ritualCard{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));overflow:auto;background:rgba(255,255,255,.985);border-radius:18px;padding:28px 22px 34px;box-shadow:none;border:0;font-family:'Hiragino Sans','Yu Gothic UI','Yu Gothic',sans-serif}
#ritualTitle{font-size:24px;font-weight:900;color:#254a71;margin-bottom:14px;line-height:1.45}
#ritualLead{font-size:20px;line-height:1.95;color:#2d4259;white-space:pre-wrap}
#ritualAction{margin-top:18px;width:100%;border:0;border-radius:18px;padding:18px 12px;background:#eef6ff;color:#1e3957;font-size:20px;font-weight:900;box-shadow:0 6px 0 rgba(0,0,0,.05);border:1px solid rgba(16,34,58,.08)}
#ritualHint{margin-top:10px;font-size:12px;color:#5a7088;text-align:center}


#tutorialOverlay{position:fixed;inset:0;z-index:200;background:rgba(11,18,28,.72);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:28px;opacity:0;transition:opacity .4s ease;pointer-events:none}
#tutorialCard{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));overflow:auto;background:rgba(255,255,255,.985);border-radius:18px;padding:32px 24px 28px;box-shadow:none;border:0;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif}
#tutorialIcon{font-size:52px;margin-bottom:14px}
#tutorialTitle{font-size:26px;font-weight:900;color:#254a71;margin-bottom:14px;line-height:1.5}
#tutorialBody{font-size:20px;color:#3a5870;line-height:1.95;margin-bottom:28px;white-space:pre-wrap}#tutorialBody strong{color:#254a71;font-weight:900}
#tutorialDots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
#tutorialNext{width:100%;padding:18px;border:0;border-radius:18px;background:#254a71;color:#fff;font-size:20px;font-weight:900;box-shadow:0 6px 0 rgba(0,0,0,.12);cursor:pointer}
#foodMenuOverlay{position:absolute;inset:0;z-index:148;background:rgba(11,18,28,.48);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.22s ease}
#foodMenuOverlay.show{opacity:1;pointer-events:auto}
#foodMenuSheet{width:100vw;height:calc(100vh - 76px - var(--safe-top) - var(--safe-bottom));margin-top:calc(38px + var(--safe-top));margin-bottom:calc(38px + var(--safe-bottom));background:rgba(255,255,255,.985);border-radius:18px;padding:16px 0 24px;box-shadow:none;overflow:hidden;display:flex;flex-direction:column}
#foodMenuHandle{width:40px;height:4px;border-radius:999px;background:rgba(0,0,0,.12);margin:0 auto 12px}
#foodMenuTitle{font-size:22px;font-weight:900;color:#254a71;text-align:center;margin-bottom:8px;line-height:1.5}
#foodMenuSub{font-size:16px;color:#7a9ab5;text-align:center;margin-bottom:14px;line-height:1.7}
#foodMenuList{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 18px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.foodItem{border:0;border-radius:18px;padding:16px 10px;background:#f2f8ff;color:#234a67;font-size:17px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid rgba(16,34,58,.08);line-height:1.6}
.foodItem .emo{font-size:30px;line-height:1}

</style>
</head>
<body>

<div id="tutorialOverlay">
  <div id="tutorialCard">
    <div id="tutorialIcon">🌿</div>
    <div id="tutorialTitle"></div>
    <div id="tutorialBody"></div>
    <div id="tutorialDots"></div>
    <button id="tutorialNext">つぎへ</button>
  </div>
</div>

<div id="app">
  <div id="skyGlow"></div>
  <div id="stars"></div>
  <div class="cloud" id="cloud1"></div>
  <div class="cloud" id="cloud2"></div>
  <div class="cloud" id="cloud3"></div>
  <div id="farHills"></div>
  <div id="midHills"></div>
  <div id="barn"></div>
  <div id="fence"><div class="fenceRail r1"></div><div class="fenceRail r2"></div></div>
  <div id="soilBand"></div>
  <div id="grassFront"></div>
  <div id="weather">晴れ</div>
  <div id="cpu">今日は静かな風が吹いています</div>
  <div id="stage">
    <div id="shadow"></div>
    <div id="petWrap"><canvas id="pet" width="96" height="96" style="display:block;image-rendering:pixelated;image-rendering:crisp-edges;width:96px;height:96px;filter:none" aria-label="モコロン"></canvas></div>
    <div id="hitArea"></div>
    <div id="bubble"></div>
  </div>
  <div id="reportDrawer"><div id="reportCard"><div id="reportShort"></div><div id="reportDetail"></div><div id="reportHint">画面をタップすると閉じます</div></div></div>
  <div id="topNav">
    <button id="btnLastReport">📖</button>
    <button id="historyBtn">記録</button>
  </div>
  <div id="groundHint" aria-hidden="true">
    <div id="groundHintGlow"></div>
    <div id="groundHintLabel"></div>
  </div>
  <div id="historyPanel"><div id="historyCard"><div id="historyTitle">これまでの記録</div><div id="historyList"></div><div id="historyHint">画面をタップすると閉じます</div></div></div>
  <div id="summaryPanel"><div id="summaryCard"><div id="summaryTitle">今日のまとめ</div><div id="summaryBody"></div><div id="summaryHint">画面をタップすると閉じます</div></div></div>
  <div id="ritualPanel"><div id="ritualCard"><div id="ritualTitle">まずはこれ</div><div id="ritualLead"></div><button id="ritualAction">やってみる</button><div id="ritualHint">画面の外側をタップすると閉じます</div></div></div>
  
  <div id="foodMenuOverlay">
    <div id="foodMenuSheet">
      <div id="foodMenuHandle"></div>
      <div id="foodMenuTitle">ごはんをえらぶ</div>
      <div id="foodMenuSub">今のモコロンに合わせて選べます</div>
      <div id="foodMenuList"></div>
    </div>
  </div>

  <div id="actions">
    <button id="btnPet"><span class="icon">👋</span>なでる</button>
    <button id="btnFeed"><span class="icon">🍎</span>ごはん</button>
    <button id="btnWipe"><span class="icon">🧼</span>ふく</button>
    <button id="btnMofu"><span class="icon">🌟</span>もふもふ</button>
  </div>
</div>
<script>
const cvs=document.getElementById('pet'); const ctx=cvs.getContext('2d');
function setupCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const logicalSize = 96;
  const drawingSize = 192;
  const scale = dpr * (drawingSize / logicalSize);
  cvs.width = Math.round(logicalSize * scale);
  cvs.height = Math.round(logicalSize * scale);
  ctx.setTransform(scale,0,0,scale,0,0);
  ctx.imageSmoothingEnabled = false;
}
setupCanvas();
window.addEventListener('resize', setupCanvas);
let C={out:'#193560',body:'#ffffff',bodyShadow:'#deefff',bodyLow:'#cce5fb',earPink:'#ffd0dc',cheek:'#ffb6c2',eye:'#193560',eyeHi:'#ffffff',eyeWarm:'#ffbd6a',toe:'#ffd0dc',accent:'#9fd8ff',dirt:'#9a7855',dull:'#87a5be',shine:'#fff1a9'};

  state.petStreak++;

  const stage = getTrustStage();
  if (stage >= 2) {
    const streak_reactions = [
      [1, TRUST_PET_WORDS[stage][0]],
      [3, TRUST_PET_WORDS[stage][1]],
      [6, stage >= 3 ? TRUST_PET_WORDS[stage][2] : '✨'],
      [12, stage >= 3 ? '🫶✨' : '😪'],
      [20, '💤'],
    ];
    let reaction = streak_reactions[0][1];
    for (const [count, text] of streak_reactions) if (state.petStreak >= count) reaction = text;
    return reaction;
  }

function buildColorSample(dateStr){
  normalizeGrowth();
  const g=state.growthProfile;
  const petAff = state.shortMemory.petting || 0;
  const mofuAff = Math.min(100, (state.mofuStreak || 0) * 12);
  const affection = Math.round(clamp(state.trust * 0.30 + petAff * 0.18 + mofuAff * 0.10 + g.bond * 0.42, 0, 100));

  const nightBonus = state.lastNightWipe === dateStr ? 100 : 0;
  const clean = Math.round(clamp(state.cleanliness * 0.34 + (state.longMemory.cleaning_relief || 0) * 0.18 + nightBonus * 0.10 + g.poise * 0.38, 0, 100));

  const maxDistNorm = Math.min(100, (state.maxDistance / 188) * 100);
  const todayDistNorm = Math.min(100, (state.todayMaxDistance / 188) * 100);
  const placeNorm = Math.min(100, (state.discoveredPlaces.length || 0) * 6);
  const omiyageNorm = Math.min(100, (state.omiyageBag.length || 0) * 8);
  const adventure = Math.round(clamp(maxDistNorm * 0.24 + todayDistNorm * 0.12 + placeNorm * 0.10 + omiyageNorm * 0.10 + g.curiosity * 0.24 + g.wild * 0.20, 0, 100));

  const toneVal = state.reportTone === 'lonely' ? 100 : state.reportTone === 'mild' ? 50 : 0;
  const neglect = Math.round(clamp((state.shortMemory.neglect || 0) * 0.22 + state.hunger * 0.18 + (100 - state.comfort) * 0.14 + toneVal * 0.12 + g.wild * 0.20 + Math.max(0, g.appetite - g.poise) * 0.14, 0, 100));

  const routine = Math.round(clamp((state.consecutiveDays || 0) * 4 + (state.longMemory.feeding_trust || 0) * 0.35 + (state.longMemory.cleaning_relief || 0) * 0.32 + g.poise * 0.18 + g.dawn * 0.08 + g.dusk * 0.08, 0, 100));
  return {date: dateStr, affection, clean, adventure, neglect, routine};
}
function recordColorDailySample(dateStr){

function getColorAverages(){
  const base = (state.colorDailySamples && state.colorDailySamples.length) ? state.colorDailySamples : [buildColorSample(new Date().toDateString())];
  const sum = base.reduce((acc, s) => {
    acc.affection += s.affection; acc.clean += s.clean; acc.adventure += s.adventure; acc.neglect += s.neglect; acc.routine += s.routine; return acc;
  }, {affection:0, clean:0, adventure:0, neglect:0, routine:0});
  const n = base.length || 1;
  return {
    affection: Math.round(sum.affection / n),
    clean: Math.round(sum.clean / n),
    adventure: Math.round(sum.adventure / n),
    neglect: Math.round(sum.neglect / n),
    routine: Math.round(sum.routine / n)
  };
}
function decideMokoronColorId(avg){
  normalizeGrowth();
  const g=state.growthProfile;
  if(avg.affection >= 90 && avg.clean >= 86 && avg.adventure >= 74 && avg.neglect < 16 && state.completedSets.length >= 1 && (state.consecutiveDays || 0) >= 7){
    return 'rainbow_prism';
  }

  const appetiteLead = g.appetite - g.poise;
  const cuddleLead = g.bond - g.wild;
  const roamLead = g.curiosity + g.wild;
  const weatherLead = Math.max(g.rain, g.wind);

  if(avg.neglect >= 82){
    if(g.wind > 58) return 'midnight_navy';
    if(g.rain > 58) return 'rain_gray';
    if(appetiteLead > 18) return state.hunger > 82 ? 'dry_straw' : 'muted_ochre';
    if(state.cleanliness < 32) return 'dusty_brown';
    return g.wild > 54 ? 'shadow_teal' : 'ash_gray';
  }
  if(avg.neglect >= 68){
    if(state.cleanliness < 45) return 'muddy_beige';
    if(g.rain > 54) return 'cloudy_bluegray';
    if(g.wind > 50) return 'dusty_violet';
    if(appetiteLead > 14) return 'muted_ochre';
    return g.wild > 48 ? 'wilted_green' : 'ash_gray';
  }

  if(cuddleLead >= 34){
    if(avg.clean >= 72 && g.poise >= 62) return 'affection_pink';
    if(g.dusk >= 56) return 'pale_peach';
    return avg.affection >= 78 ? 'sakura' : 'warm_beige';
  }

  if(g.poise >= 76 && g.dusk >= 42){
    if(avg.clean >= 86) return 'white_gold';
    return g.dawn >= 36 ? 'sunlight_yellow' : 'cream';
  }

  if(roamLead >= 122){
    if(g.wind >= 54) return 'star_sky_blue';
    if(g.rain >= 50) return 'soft_water';
    return g.wild >= 58 ? 'adventure_teal' : 'pale_sky';
  }

  if(g.appetite >= 72){
    if(g.dawn >= 42) return 'honey';
    if(appetiteLead >= 16) return 'amber_orange';
    return 'sunset_orange';
  }

  if(g.rain >= 62){
    return avg.clean >= 62 ? 'soft_water' : 'cloudy_bluegray';
  }
  if(g.wind >= 62){
    return avg.adventure >= 60 ? 'star_sky_blue' : 'shadow_teal';
  }
  if(g.curiosity >= 64){
    return state.omiyageBag.length >= 5 ? 'meadow_lime' : 'young_leaf';
  }

  if(avg.clean >= 74 && avg.affection >= 66) return 'cream';
  if(avg.affection >= 72) return 'warm_beige';
  if(avg.adventure >= 62) return 'young_leaf';
  return 'plain_white';
}

  return now - (state.lastFeedAt || 0) >= 3 * 60 * 60 * 1000;

function countEffectiveAction(type) {
  const today = new Date().toDateString();
  const dateKey = `${type}EffectiveDate`;
  const countKey = `${type}EffectiveCount`;
  const limits = { pet: PET_DAILY_EFFECTIVE_LIMIT, wipe: 2, petting: PET_DAILY_EFFECTIVE_LIMIT };
  const limit = limits[type] || 2;

  if (state[dateKey] !== today) {
    state[dateKey] = today;
    state[countKey] = 0;
  }
  if ((state[countKey] || 0) < limit) {
    if (type === 'pet' || type === 'petting') state.actionCounts.petting = (state.actionCounts.petting || 0) + 1;
    if (type === 'wipe') state.actionCounts.cleaning = (state.actionCounts.cleaning || 0) + 1;
    state[countKey]++;
    return true;
  }
  return false;
}

function updateBlink(dt){
  state.blinkTimer += dt/16.67;
  if(state.isBlinking){
    if(state.blinkTimer >= 6){
      state.isBlinking = false;
      state.blinkTimer = 0;
      if(state.doubleBlinkQueued){
        state.doubleBlinkQueued = false;
        state.nextBlinkAt = 4 + Math.random()*6;
      }else{
        state.nextBlinkAt = 70 + Math.random()*130;
      }
    }
    return;
  }
  if(state.blinkTimer >= state.nextBlinkAt){
    state.isBlinking = true;
    state.blinkTimer = 0;
    state.doubleBlinkQueued = Math.random() > 0.72;
  }
}

  window.addEventListener('pagehide', saveState);
}
function loop(ts){if(!state.lastTs)state.lastTs=ts;const dt=ts-state.lastTs;state.lastTs=ts;state.breath+=0.05;state.tailWave+=0.13;state.cloudPhase+=(state.weather==='晴れ'?0.008:0.003);updateBlink(dt);const distTiltMap={near:2.4,mid:.8,far:-1.6,corner:-2.4};state.targetEarTilt=(distTiltMap[state.dist]||0)+(state.mood==='happy'?1.2:0)+(state.mood==='love'?.8:0)+(state.mood==='sleep'?-1.4:0)+(state.impactX||0)*0.5;state.earTilt+=(state.targetEarTilt-state.earTilt)*0.16;state.tailLag+=(((state.targetEarTilt*0.45)-(state.tailLag||0))*0.12);state.impactX*=0.78;state.impactY*=0.78;const app=document.getElementById('app');if(app){if(state.weather==='晴れ'){app.classList.add('cloud-pass');}else{app.classList.remove('cloud-pass');}}const anim=getAnim();if(ts%(anim.speed*4)<dt*4){state.frame++;drawMokoron();updateDistanceLayout();updateGroundHint();}requestAnimationFrame(loop);}
function initGrass(){const grass=document.getElementById('grassFront');for(let i=0;i<170;i++){const blade=document.createElement('div');blade.className=Math.random()>.86?'blade wheat':Math.random()>.44?'blade dark':'blade';blade.style.left=(Math.random()*100)+'%';blade.style.height=(14+Math.random()*72)+'px';blade.style.animationDelay=(-Math.random()*3.6)+'s';blade.style.opacity=(.42+Math.random()*.5).toFixed(2);grass.appendChild(blade);}const fence=document.getElementById('fence');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='post';p.style.left=(3+i*8.5)+'%';fence.appendChild(p);}}
loadState();generatePersonality();registerLoginDay();checkConsecutiveDays();applyMokoronPalette(state.currentColorId || 'plain_white');decideMood();bindUI();updateTopButtons();updateGroundHint(true);initGrass();initStars();setWeather(state.weather||'晴れ');generateTomorrowWeather();setCPU();updateDistanceLayout();drawMokoron();renderHistory();updateMofuBtn();requestAnimationFrame(loop);if(!state.tutorialDone) showTutorial(); setInterval(tickWorld,5000);setInterval(()=>{
  if(isDeepNight()){
    if(state.mood!=='love'&&state.mood!=='happy'){
      state.mood='sleep';
      state.dist=state.trust>70?'far':'corner';
    }
    updateDistanceLayout();
    return;
  }
  if(state.mood==='idle'&&state.hunger<60&&Math.random()>.6){
    state.mood='drowsy';
    state.dist=state.trust>66?'mid':'far';
    setTimeout(()=>{
      if(state.mood==='drowsy' && !isDeepNight()){
        state.mood='sleep';
        state.dist=state.trust>70?'far':'corner';
      }
    },2600);
  }else if(state.mood==='sleep'&&Math.random()>.46){
    state.mood='idle';
    state.dist='mid';
  }
  updateRoaming();
},9000);
</script>
